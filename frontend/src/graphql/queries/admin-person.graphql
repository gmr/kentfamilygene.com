query AdminPerson($id: String!) {
  adminPerson(id: $id) {
    id
    givenName
    surname
    nameSuffix
    namePrefix
    nameQualifier
    sex
    birthDate
    birthDateSort
    birthDateModifier
    birthPlace
    deathDate
    deathDateSort
    deathDateModifier
    deathPlace
    isLiving
    privacyLabel
    isImmigrantAncestor
    notes
    createdDate
    updatedDate
    parents {
      person { id givenName surname privacyLabel }
      relationshipType
    }
    children { id givenName surname privacyLabel birthDateSort }
    spouses {
      spouse { id givenName surname privacyLabel }
      marriageDate
      marriagePlace
      marriageOrder
      spouseSurname
    }
    lineageAssignments {
      lineage { id displayName region }
      role
      generationNumber
      certainty
    }
    adminNotes { id color text createdDate resolved }
  }
}
