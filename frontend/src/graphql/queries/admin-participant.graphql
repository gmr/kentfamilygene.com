query AdminParticipant($id: String!) {
  adminParticipant(id: $id) {
    id
    displayName
    email
    membershipType
    isActive
    ftdnaKitNumber
    joinDate
    contactNote
    researchGoal
    createdDate
    updatedDate
    linkedPerson { id givenName surname }
    dnaTests { id testType testName provider kitNumber markerCount registeredWithProject gedmatchKit }
    onlineTrees { id platform username treeName url }
    haplogroups { id name subclade abbreviation haplogroupType }
    lineageMemberships {
      lineage { id displayName region }
      branchLabel
    }
    geneticMatches {
      participant { id displayName ftdnaKitNumber }
      markerLevel
      matchType
      notes
    }
    adminNotes { id color text createdDate resolved }
  }
}
