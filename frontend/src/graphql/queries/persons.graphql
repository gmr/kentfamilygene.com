query Persons($surname: String, $offset: Int, $limit: Int) {
  persons(surname: $surname, offset: $offset, limit: $limit) {
    items {
      id
      givenName
      surname
      nameSuffix
      namePrefix
      nameQualifier
      sex
      birthDate
      birthDateModifier
      birthPlace
      deathDate
      deathDateModifier
      deathPlace
      isLiving
      privacyLabel
      isImmigrantAncestor
      notes
      createdDate
      updatedDate
    }
    total
    hasMore
  }
}
